name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 76.13.153.215
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /docker/regionfinder/deploy.sh
